<!DOCTYPE html>
<html>
<head>
    <title>FRIS Dashboard</title>
</head>
<body>

<h1>Today's Action Priority</h1>

<table border="1">
    <tr>
        <th>Grid ID</th>
        <th>Priority</th>
        <th>Action</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row.grid_id }}</td>
        <td>{{ row.final_priority }}</td>
        <td>{{ row.patrol_action }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
